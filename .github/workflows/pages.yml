# Deploys the marketing site to GitHub Pages on every push to main.
#
# The Pages site carries the custom domain fiducia.cloud (public/CNAME), so the
# build uses PUBLIC_BASE=/ — assets resolve from the domain root, not the
# /fiducia gateway prefix used by the in-cluster deployment. Both deployments
# build from the same source; only the base path differs.
name: pages
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          path: repo
      # npm ci needs the sibling `file:../` deps present (same layout as ci.yml).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: fiducia-cloud/fiducia-interfaces
          ref: 487e470c45ab5851e8f6f3b1dc048fe067fbf408
          path: fiducia-interfaces
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: fiducia-cloud/fiducia-test-config
          ref: 825220281fdc16bbf47a035177001d2fe29bdabf
          path: fiducia-test-config
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
      - run: npm ci --ignore-scripts
        working-directory: repo
      - run: npm run build
        working-directory: repo
        env:
          PUBLIC_BASE: /
      - uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: repo/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
