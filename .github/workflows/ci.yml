# CI: checks out the repo with its sibling file: deps, then runs contract tests
# and the Astro build (gating), plus a best-effort browser E2E job.
name: ci
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          path: repo
      # GitHub Actions checks out one repo in isolation, but npm ci needs the
      # sibling `file:../` deps (@fiducia/interfaces, @fiducia/test-config) present
      # alongside so `../fiducia-interfaces` etc. resolve.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: fiducia-cloud/fiducia-interfaces
          path: fiducia-interfaces
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: fiducia-cloud/fiducia-test-config
          path: fiducia-test-config
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
      - run: npm ci
        working-directory: repo
      # Node --test contract specs (site-contract.test.mjs).
      - run: npm test
        working-directory: repo
      # Astro production build — the gating step.
      - run: npm run build
        working-directory: repo

  # Browser e2e (Playwright/Puppeteer) needs a real Chrome and the sibling
  # @fiducia/test-config file: dependency, so it is best-effort only.
  browser-e2e:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          path: repo
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: fiducia-cloud/fiducia-interfaces
          path: fiducia-interfaces
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: fiducia-cloud/fiducia-test-config
          path: fiducia-test-config
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
      - id: chrome
        # Third-party action: pinned to a full commit SHA (v2) so a moved tag
        # can't inject code; dependabot keeps the pin updated.
        uses: browser-actions/setup-chrome@2e1d749697dd1612b833dba4a722266286fbefcd # v2
      - run: npm ci
        working-directory: repo
      - name: browser tests
        working-directory: repo
        env:
          CHROME_BIN: ${{ steps.chrome.outputs.chrome-path }}
        run: npm run test:browser
