name: ci
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      # Node --test contract specs (site-contract.test.mjs).
      - run: npm test
      # Astro production build — the gating step.
      - run: npm run build

  # Browser e2e (Playwright/Puppeteer) needs a real Chrome and the sibling
  # @fiducia/test-config file: dependency, so it is best-effort only.
  browser-e2e:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - id: chrome
        uses: browser-actions/setup-chrome@v1
      - run: npm ci
      - name: browser tests
        env:
          CHROME_BIN: ${{ steps.chrome.outputs.chrome-path }}
        run: npm run test:browser
